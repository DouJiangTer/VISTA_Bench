<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page-type annotator</title>
<style>
  :root {
    --bg: #0f1117; --panel: #1a1d27; --panel-2: #232735; --line: #2e3344;
    --ink: #e6e8ee; --mute: #8b91a3; --accent: #6aa6ff; --good: #5fd07a; --warn: #f0b75a;
    --danger: #e36868;
    --t-singleton: #6aa6ff; --t-detail: #5fd07a; --t-archive: #f0b75a;
    --t-list: #b988e8; --t-form: #e36868; --t-modal: #8b91a3;
  }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
  #app{display:grid;grid-template-columns:280px 1fr 380px;height:100vh}

  /* sidebar (tasks + pages) */
  aside.tasks{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto}
  aside.tasks h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);
                 margin:14px 14px 6px;font-weight:600}
  details.task{margin:0 4px}
  details.task>summary{cursor:pointer;padding:8px 12px;border-radius:6px;font-size:13px;
                       display:flex;justify-content:space-between;align-items:center;list-style:none}
  details.task>summary::-webkit-details-marker{display:none}
  details.task>summary:hover{background:var(--panel-2)}
  details.task .progress{font-size:11px;color:var(--mute)}
  details.task .progress.done{color:var(--good)}
  details.task ul{list-style:none;margin:2px 0 8px;padding:0}
  details.task li{padding:5px 12px 5px 24px;font-size:12.5px;cursor:pointer;border-radius:4px;
                  display:flex;justify-content:space-between;align-items:center;gap:6px}
  details.task li:hover{background:var(--panel-2)}
  details.task li.active{background:var(--accent);color:white}
  details.task li .badge{font-size:10px;padding:1px 6px;border-radius:8px;color:white;flex-shrink:0}

  /* viewer */
  main.viewer{overflow:auto;padding:16px;background:#000}
  main.viewer .empty{color:var(--mute);text-align:center;padding-top:40vh}
  main.viewer img{max-width:100%;display:block;margin:0 auto;background:#fff}
  main.viewer .meta{color:var(--mute);font-size:12px;text-align:center;margin-bottom:8px}

  /* annotator panel */
  section.panel{background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow-y:auto}
  section.panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);
                   margin:0 0 6px;font-weight:600}
  section.panel .page-name{font-size:15px;font-weight:600;margin:4px 0 16px}
  section.panel label{display:block;font-size:11px;color:var(--mute);text-transform:uppercase;
                      letter-spacing:.4px;margin:14px 0 6px;font-weight:600}
  section.panel .types{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  section.panel .types button{padding:10px;border:1px solid var(--line);background:var(--panel-2);
                              color:var(--ink);border-radius:6px;cursor:pointer;font-size:12px;
                              font-weight:500;text-align:left;transition:all .1s}
  section.panel .types button:hover{border-color:#fff3}
  section.panel .types button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  section.panel .types button[data-type="singleton"].active{background:var(--t-singleton);border-color:var(--t-singleton)}
  section.panel .types button[data-type="detail"].active   {background:var(--t-detail);border-color:var(--t-detail);color:#1a1d27}
  section.panel .types button[data-type="archive"].active  {background:var(--t-archive);border-color:var(--t-archive);color:#1a1d27}
  section.panel .types button[data-type="list"].active     {background:var(--t-list);border-color:var(--t-list)}
  section.panel .types button[data-type="form"].active     {background:var(--t-form);border-color:var(--t-form)}
  section.panel .types button[data-type="modal"].active    {background:var(--t-modal);border-color:var(--t-modal);color:#1a1d27}
  section.panel input[type="text"]{width:100%;padding:8px 10px;background:var(--panel-2);
                                   border:1px solid var(--line);color:var(--ink);border-radius:5px;
                                   font-size:12.5px;font-family:ui-monospace,monospace}
  section.panel input[type="text"]::placeholder{color:#4f5466}
  section.panel input[type="text"]:focus{outline:none;border-color:var(--accent)}
  section.panel .hint{font-size:11px;color:var(--mute);margin:6px 0 0}
  section.panel nav.actions{display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line)}
  section.panel nav.actions button{flex:1;padding:8px;border:1px solid var(--line);background:var(--panel-2);
                                   color:var(--ink);border-radius:5px;cursor:pointer;font-size:12px}
  section.panel nav.actions button.primary{background:var(--accent);border-color:var(--accent)}
  section.panel nav.actions button:hover{background:var(--panel-2);filter:brightness(1.2)}

  /* keyboard hint */
  .kbd{font-family:ui-monospace,monospace;font-size:10px;padding:1px 5px;border-radius:3px;
       background:#3a3f50;color:#cfd3df;margin-left:6px}

  /* toolbar */
  header.bar{position:fixed;top:8px;right:400px;display:flex;gap:6px;background:var(--panel);
             padding:6px 10px;border-radius:6px;border:1px solid var(--line);font-size:11.5px;color:var(--mute);
             z-index:10;box-shadow:0 4px 12px #0008}
  header.bar strong{color:var(--ink)}
</style>
</head>
<body>
<header class="bar">
  Annotated <strong id="stat-done">0</strong> / <strong id="stat-total">0</strong>
  &nbsp;·&nbsp; <span id="stat-pct">0%</span>
</header>

<div id="app">
  <aside class="tasks">
    <h2>Tasks</h2>
    <div id="taskList"></div>
  </aside>

  <main class="viewer" id="viewer">
    <div class="empty">Pick a page from the left.</div>
  </main>

  <section class="panel" id="panel">
    <h2>Page type</h2>
    <div class="page-name" id="curPage">—</div>

    <label>Type <span class="kbd">1–6</span></label>
    <div class="types" id="typeButtons">
      <button data-type="singleton">singleton<br><small>fixed URL</small></button>
      <button data-type="detail">detail<br><small>:id / :slug template</small></button>
      <button data-type="archive">archive<br><small>filtered list (cat/tag/date)</small></button>
      <button data-type="list">list<br><small>full index, no param</small></button>
      <button data-type="form">form<br><small>compose / submit</small></button>
      <button data-type="modal">modal<br><small>overlay, no URL</small></button>
    </div>

    <label>Route pattern</label>
    <input type="text" id="routePattern" placeholder="/products/:id">
    <p class="hint">Auto-suggested from page name + type. Edit if needed.</p>

    <label>Sample URL</label>
    <input type="text" id="sampleUrl" placeholder="/products/1">
    <p class="hint">For singletons = route pattern. For detail/archive = a concrete seeded instance.</p>

    <label>Notes (optional)</label>
    <input type="text" id="notes" placeholder="">

    <nav class="actions">
      <button id="prev">← Prev <span class="kbd">k</span></button>
      <button id="next" class="primary">Next → <span class="kbd">j</span></button>
    </nav>
    <nav class="actions">
      <button id="exportBtn">Export JSON</button>
      <button id="importBtn">Import JSON</button>
      <button id="resetDefaultsBtn">Reset to pre-anno</button>
      <button id="clearBtn">Clear all</button>
    </nav>
    <input type="file" id="importFile" accept=".json" hidden>
  </section>
</div>

// ===== state =====
const STORAGE_KEY = "page_type_annotations_v1";
let annotations = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
if (!annotations || Object.keys(annotations).length === 0) {
  // First open (or after Clear all): seed from pre-annotations.
  annotations = JSON.parse(JSON.stringify(DEFAULTS));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
}
let flatList = [];   // [{task, page, idx}]
let cursor = -1;

MANIFEST.forEach(t => t.pages.forEach(p => flatList.push({task: t.task, page: p})));

// ===== render task tree =====
const taskList = document.getElementById("taskList");
function renderTaskTree() {
  taskList.innerHTML = "";
  MANIFEST.forEach(t => {
    const det = document.createElement("details");
    det.className = "task";
    det.open = true;
    const sum = document.createElement("summary");
    const done = t.pages.filter(p => annotations[`${t.task}/${p}`]?.type).length;
    const total = t.pages.length;
    sum.innerHTML = `<span>${t.task}</span><span class="progress ${done===total?'done':''}">${done}/${total}</span>`;
    det.appendChild(sum);
    const ul = document.createElement("ul");
    t.pages.forEach(p => {
      const li = document.createElement("li");
      li.dataset.task = t.task; li.dataset.page = p;
      const ann = annotations[`${t.task}/${p}`];
      const badge = ann?.type
        ? `<span class="badge" style="background:var(--t-${ann.type})">${ann.type}</span>` : "";
      li.innerHTML = `<span>${p.replace(/\.png$/, "")}</span>${badge}`;
      li.onclick = () => loadPage(t.task, p);
      ul.appendChild(li);
    });
    det.appendChild(ul);
    taskList.appendChild(det);
  });
  updateStats();
}

function updateStats() {
  const total = flatList.length;
  const done = flatList.filter(x => annotations[`${x.task}/${x.page}`]?.type).length;
  document.getElementById("stat-done").textContent = done;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-pct").textContent = total ? `${Math.round(done/total*100)}%` : "0%";
}

// ===== load a page =====
function loadPage(task, page) {
  cursor = flatList.findIndex(x => x.task === task && x.page === page);
  document.querySelectorAll("aside.tasks li").forEach(li =>
    li.classList.toggle("active", li.dataset.task === task && li.dataset.page === page));
  // image
  const viewer = document.getElementById("viewer");
  const url = `../${task}/pages/${page}`;
  viewer.innerHTML = `<div class="meta">${task} · ${page}</div><img src="${url}" alt="${page}">`;
  // panel
  document.getElementById("curPage").textContent = `${task} / ${page.replace(/\.png$/, "")}`;
  const key = `${task}/${page}`;
  const ann = annotations[key] || {};
  document.querySelectorAll("#typeButtons button").forEach(b =>
    b.classList.toggle("active", b.dataset.type === ann.type));
  document.getElementById("routePattern").value = ann.route ?? autoRoute(page, ann.type);
  document.getElementById("sampleUrl").value    = ann.sample ?? autoSample(page, ann.type, ann.route);
  document.getElementById("notes").value        = ann.notes  ?? "";
}

// ===== auto suggestions =====
function pageSlug(filename) {
  // 05_Product_Page.png → product-page
  return filename.replace(/\.png$/, "")
                 .replace(/^\d+_?/, "")
                 .toLowerCase()
                 .replace(/_/g, "-");
}
function autoRoute(filename, type) {
  const slug = pageSlug(filename);
  switch (type) {
    case "singleton": return `/${slug}`;
    case "detail":    return `/${slug.replace(/-page$|-detail$|-view$|-single$/,"") + "s"}/:id`;
    case "archive":   return `/${slug}/:slug`;
    case "list":      return `/${slug}`;
    case "form":      return `/${slug}`;
    case "modal":     return "(no URL)";
    default:          return "";
  }
}
function autoSample(filename, type, route) {
  const r = route || autoRoute(filename, type);
  if (!r || r === "(no URL)") return r;
  // /products/:id → /products/1; /category/:slug → /category/sample
  return r.replace(/:id\b/g, "1").replace(/:[a-z_-]+/gi, "sample");
}

// ===== save current panel state =====
function saveCurrent(activeType) {
  if (cursor < 0) return;
  const {task, page} = flatList[cursor];
  const key = `${task}/${page}`;
  annotations[key] = {
    type:   activeType ?? annotations[key]?.type ?? null,
    route:  document.getElementById("routePattern").value.trim(),
    sample: document.getElementById("sampleUrl").value.trim(),
    notes:  document.getElementById("notes").value.trim(),
  };
  if (!annotations[key].type) delete annotations[key];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
  renderTaskTree();  // re-render badges + progress
  // re-highlight
  document.querySelectorAll("aside.tasks li").forEach(li =>
    li.classList.toggle("active", li.dataset.task === task && li.dataset.page === page));
}

// ===== type button handler =====
document.querySelectorAll("#typeButtons button").forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.type;
    document.querySelectorAll("#typeButtons button").forEach(b => b.classList.toggle("active", b === btn));
    // refresh route/sample defaults if empty
    const pattern = document.getElementById("routePattern");
    const sample  = document.getElementById("sampleUrl");
    const {page} = flatList[cursor] || {};
    if (page && !pattern.value) pattern.value = autoRoute(page, t);
    if (page && !sample.value)  sample.value  = autoSample(page, t, pattern.value);
    saveCurrent(t);
  };
});

// ===== inputs auto-save =====
["routePattern","sampleUrl","notes"].forEach(id => {
  document.getElementById(id).addEventListener("blur", () => saveCurrent());
});

// ===== nav buttons & keyboard =====
function move(d) {
  const next = Math.max(0, Math.min(flatList.length - 1, cursor + d));
  if (next === cursor) return;
  const {task, page} = flatList[next];
  loadPage(task, page);
}
document.getElementById("prev").onclick = () => move(-1);
document.getElementById("next").onclick = () => move(+1);
document.addEventListener("keydown", (e) => {
  if (["INPUT","TEXTAREA"].includes(e.target.tagName)) return;
  if (e.key === "j" || e.key === "ArrowDown")  { e.preventDefault(); move(+1); }
  if (e.key === "k" || e.key === "ArrowUp")    { e.preventDefault(); move(-1); }
  const map = {"1":"singleton","2":"detail","3":"archive","4":"list","5":"form","6":"modal"};
  if (map[e.key]) {
    document.querySelector(`#typeButtons button[data-type="${map[e.key]}"]`).click();
  }
});

// ===== export / import / clear =====
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(annotations, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "page_types.json";
  a.click();
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").onchange = async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const text = await f.text();
  try {
    annotations = JSON.parse(text);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
    renderTaskTree();
    if (cursor >= 0) loadPage(flatList[cursor].task, flatList[cursor].page);
  } catch (err) { alert("Bad JSON: " + err); }
};
document.getElementById("clearBtn").onclick = () => {
  if (confirm("Clear ALL annotations? (Use 'Reset to pre-anno' if you want the auto-classified starting set instead.)")) {
    annotations = {};
    localStorage.removeItem(STORAGE_KEY);
    renderTaskTree();
    if (cursor >= 0) loadPage(flatList[cursor].task, flatList[cursor].page);
  }
};
document.getElementById("resetDefaultsBtn").onclick = () => {
  if (confirm("Discard your edits and reset every page to the auto-classified pre-annotations?")) {
    annotations = JSON.parse(JSON.stringify(DEFAULTS));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
    renderTaskTree();
    if (cursor >= 0) loadPage(flatList[cursor].task, flatList[cursor].page);
  }
};

// ===== bootstrap =====
renderTaskTree();
if (flatList.length) loadPage(flatList[0].task, flatList[0].page);
</script>
</body>
</html>
